services:
  # ─── Infrastructure ───
  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ─── Backend API ───
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - pdf_uploads:/app/uploads
    depends_on:
      - valkey
      - qdrant
    restart: unless-stopped

  # ─── Background Worker ───
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.worker
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - pdf_uploads:/app/uploads
    depends_on:
      - valkey
      - qdrant
    restart: unless-stopped

  # ─── Frontend ───
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  valkey_data:
  qdrant_data:
  pdf_uploads: